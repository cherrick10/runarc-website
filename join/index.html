<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're invited to Arc</title>
  <meta name="description" content="You've been invited to join Arc — the crew fitness and accountability app." />
  <link rel="icon" href="/favicon.png" />
  <style>
    :root {
      --teal: #1a9c8a;
      --teal-dark: #127a6a;
      --teal-light: #eaf4f2;
      --text: #0f2420;
      --muted: #4d7470;
      --border: #d6eae8;
      --surface: #f5faf9;
      --bg: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 20px;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 28px;
    }
    .logo-wrap img {
      height: 40px;
      width: auto;
      display: block;
    }

    /* ── Card ── */
    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(15,36,32,0.08), 0 1px 4px rgba(15,36,32,0.04);
      text-align: center;
    }

    /* ── Emoji / group icon ── */
    .invite-emoji {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--teal-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 20px;
      line-height: 1;
    }

    /* ── Text ── */
    .invite-from {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 6px;
    }

    .invite-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .invite-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .invite-sub strong { color: var(--text); font-weight: 600; }

    /* ── Buttons ── */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 13px;
      font-size: 16px;
      font-weight: 700;
      background: var(--teal);
      color: #fff !important;
      text-decoration: none;
      margin-bottom: 10px;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(26,156,138,0.3);
    }
    .btn-primary:hover { background: var(--teal-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 13px;
      font-size: 15px;
      font-weight: 600;
      background: transparent;
      color: var(--text) !important;
      text-decoration: none;
      border: 1.5px solid var(--border);
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-secondary:hover { border-color: var(--teal); background: var(--teal-light); }

    /* ── Status note ── */
    .status-note {
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Features strip ── */
    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }
    .feature-icon-wrap {
      width: 32px;
      height: 32px;
      background: var(--teal-light);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--teal);
    }

    /* ── Footer ── */
    .page-footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .page-footer a { color: var(--teal); text-decoration: none; }

    /* ── Loading state ── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: block; }
    .loading .btn-label { display: none; }

    @media (max-width: 440px) {
      .card { padding: 28px 22px 24px; border-radius: 20px; }
      .invite-title { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <a href="https://runarc.app">
      <img src="/logo.png" alt="Arc" />
    </a>
  </div>

  <div class="card">
    <div class="invite-emoji" id="invite-emoji">💪</div>
    <p class="invite-from" id="invite-from">Invitation</p>
    <h1 class="invite-title" id="invite-title">You're invited to Arc</h1>
    <p class="invite-sub" id="invite-sub">Join your crew, track your workouts, and stay accountable together.</p>

    <a id="btn-open" href="#" class="btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span class="btn-label">Open in Arc</span>
      <span class="spinner"></span>
    </a>

    <div class="divider">or</div>

    <a id="btn-download" href="https://apps.apple.com/app/id6771915576" class="btn-secondary">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      Download Arc — Free
    </a>

    <div class="features">
      <div class="feature">
        <div class="feature-icon-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        Workouts
      </div>
      <div class="feature">
        <div class="feature-icon-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H3.5a2.5 2.5 0 0 0 0 5H6"/><path d="M18 9h2.5a2.5 2.5 0 0 1 0 5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        </div>
        Crew Score
      </div>
      <div class="feature">
        <div class="feature-icon-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
        </div>
        Crew Chat
      </div>
    </div>

    <p class="status-note" id="status-note"></p>
  </div>

  <p class="page-footer">
    <a href="https://runarc.app">runarc.app</a> &nbsp;·&nbsp;
    <a href="https://runarc.app/privacy">Privacy</a> &nbsp;·&nbsp;
    <a href="https://runarc.app/terms">Terms</a>
  </p>

<script>
(function () {
  const params     = new URLSearchParams(window.location.search);
  const type       = params.get('type') || 'group';
  const code       = params.get('code') || '';
  const groupName  = params.get('group') || '';
  const emoji      = params.get('emoji') || '';
  const from       = params.get('from') || '';
  const name       = params.get('name') || '';
  const colorIdx   = params.get('colorIdx') || '0';
  const fromUserId = params.get('fromUserId') || '';

  const emojiEl    = document.getElementById('invite-emoji');
  const fromLabel  = document.getElementById('invite-from');
  const titleEl    = document.getElementById('invite-title');
  const subEl      = document.getElementById('invite-sub');
  const openBtn    = document.getElementById('btn-open');
  const downloadBtn= document.getElementById('btn-download');
  const statusNote = document.getElementById('status-note');

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  var deepLink = '';

  if (type === 'circle') {
    var sender = name || from || 'Someone';
    emojiEl.textContent = '🤝';
    fromLabel.textContent = esc(sender) + ' invited you';
    titleEl.textContent   = 'Join ' + esc(sender) + '’s circle';
    subEl.innerHTML       = 'Track workouts, share stats, and stay accountable with <strong>' + esc(sender) + '</strong> on Arc.';
    deepLink = 'arc://circle-join?code=' + encodeURIComponent(code)
      + '&name=' + encodeURIComponent(sender)
      + '&colorIdx=' + encodeURIComponent(colorIdx)
      + (fromUserId ? '&fromUserId=' + encodeURIComponent(fromUserId) : '');
  } else {
    var sender = from || 'Someone';
    var gName  = groupName || 'a group';
    emojiEl.textContent = emoji || '💪';
    fromLabel.textContent = esc(sender) + ' invited you';
    titleEl.textContent   = 'Join ' + esc(gName);
    subEl.innerHTML       = '<strong>' + esc(sender) + '</strong> wants you in the crew. Hit your goals together.';
    deepLink = 'arc://group-join?code=' + encodeURIComponent(code)
      + '&group=' + encodeURIComponent(gName)
      + '&emoji=' + encodeURIComponent(emoji || '')
      + '&from=' + encodeURIComponent(sender);
  }

  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  if (deepLink && deepLink !== 'arc://') {
    openBtn.href = deepLink;

    if (isMobile) {
      // On mobile: clicking open button tries the deep link.
      // If the app is installed, iOS/Android handles it instantly.
      // If not, after 2.5s with no visibilitychange, we surface the download button.
      openBtn.addEventListener('click', function (e) {
        e.preventDefault();
        openBtn.classList.add('loading');
        var t0 = Date.now();
        window.location.href = deepLink;
        var check = setTimeout(function () {
          if (!document.hidden && Date.now() - t0 < 3500) {
            // App likely not installed — surface download prominently
            openBtn.classList.remove('loading');
            openBtn.style.display = 'none';
            document.querySelector('.divider').style.display = 'none';
            downloadBtn.style.background = 'var(--teal)';
            downloadBtn.style.color = '#fff';
            downloadBtn.style.borderColor = 'var(--teal)';
            downloadBtn.style.boxShadow = '0 2px 8px rgba(26,156,138,0.3)';
            var btnLabel = downloadBtn.querySelector('span') || downloadBtn;
            statusNote.textContent = 'Get Arc free on the App Store, then tap your invite link again to join instantly.';
          }
        }, 2500);
        document.addEventListener('visibilitychange', function onVC() {
          clearTimeout(check);
          openBtn.classList.remove('loading');
          document.removeEventListener('visibilitychange', onVC);
        });
      });
    }
  } else {
    // No valid deep link — hide open button, make download primary
    openBtn.style.display = 'none';
    document.querySelector('.divider').style.display = 'none';
    downloadBtn.style.background = 'var(--teal)';
    downloadBtn.style.color = '#fff';
    downloadBtn.style.borderColor = 'var(--teal)';
    downloadBtn.style.boxShadow = '0 2px 8px rgba(26,156,138,0.3)';
  }

  if (!isMobile) {
    statusNote.textContent = 'Arc is available on iPhone and iPad. Download it to join your crew.';
  }
})();
</script>
</body>
</html>
